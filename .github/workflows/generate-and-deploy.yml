name: Generate & Deploy

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate-build-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate data from APIs
        run: npx tsx scripts/generate-pages.ts
        env:
          AETHAR_API_KEY: ${{ secrets.AETHAR_API_KEY }}

      - name: Generate weekly report
        run: npx tsx scripts/generate-weekly-report.ts

      # Persist newly-generated weekly reports to git so the archive accumulates.
      # Without this, each Monday's run wipes the previous week's report from
      # the deployed site (rsync --delete) because actions/checkout removes
      # untracked files at the start of every run.
      - name: Commit new weekly reports
        if: github.event_name == 'schedule'
        run: |
          git config user.name "aethar-bot"
          git config user.email "bot@aethar.dev"
          git add app/reports/
          if ! git diff --staged --quiet; then
            git commit -m "data: weekly report $(date -u +%Y-%m-%d) [skip ci]"
            git push origin HEAD:main
          else
            echo "No new report files to commit."
          fi

      - name: Build
        run: npm run build

      - name: Deploy
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: out/
          remote_path: /var/www/aethar-data-pages/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
