name: Generate & Deploy

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-build-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate data from APIs
        run: npx tsx scripts/generate-pages.ts
        env:
          AETHAR_API_KEY: ${{ secrets.AETHAR_API_KEY }}

      - name: Build
        run: npm run build

      - name: Deploy
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: out/
          remote_path: /var/www/aethar-data-pages/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
