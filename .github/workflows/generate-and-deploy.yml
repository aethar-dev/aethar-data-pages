name: Generate & Deploy

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate-build-deploy:
    runs-on: self-hosted
    outputs:
      should_post: ${{ steps.preflight.outputs.should_post }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate data from APIs
        run: npx tsx scripts/generate-pages.ts
        env:
          AETHAR_API_KEY: ${{ secrets.AETHAR_API_KEY }}

      - name: Generate weekly report
        run: npx tsx scripts/generate-weekly-report.ts

      # Persist newly-generated weekly reports to git BEFORE the X post step,
      # so the archive accumulates and Monday's tweet links to a page that
      # will still exist next week. Without this, actions/checkout cleans
      # untracked weekly-* dirs and rsync --delete wipes them from prod.
      - name: Commit new weekly reports
        if: github.event_name == 'schedule'
        run: |
          git config user.name "aethar-bot"
          git config user.email "bot@aethar.dev"
          git add app/reports/
          if ! git diff --staged --quiet; then
            git commit -m "data: weekly report $(date -u +%Y-%m-%d) [skip ci]"
            git push origin HEAD:main
          else
            echo "No new report files to commit."
          fi

      # Post the new weekly report to @aethardev — runs only on Mondays
      # (ISO day-of-week 1) on the scheduled cron, so we tweet exactly once
      # per week with the freshly-generated numbers. Manual workflow_dispatch
      # runs skip this step entirely (avoid accidental double-post).
      #
      # Sanity checks live in the script (zero values, anchor-country presence,
      # plausible HICP/unemployment ranges, length). Two-stage gate:
      #   1. The job below FIRST does a DRY_RUN — script runs sanity checks
      #      and prints the tweet body. If sanity fails, the job stops here.
      #   2. The next job ('post-weekly-tweet') runs in the 'x-post' GitHub
      #      Environment which requires manual reviewer approval. Only after
      #      you approve in the GH Actions UI does the actual POST fire.
      - name: Preflight tweet (dry-run + sanity)
        id: preflight
        if: github.event_name == 'schedule'
        run: |
          if [ "$(date -u +%u)" = "1" ]; then
            DRY_RUN=true npx tsx scripts/post-weekly-tweet.ts
            echo "should_post=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not Monday — skipping X post."
            echo "should_post=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build

      - name: Deploy
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: out/
          remote_path: /var/www/aethar-data-pages/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Upload generated data for X post job
        if: steps.preflight.outputs.should_post == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: weekly-data
          path: data/generated/
          retention-days: 1

  post-weekly-tweet:
    needs: generate-build-deploy
    if: needs.generate-build-deploy.outputs.should_post == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    environment:
      name: x-post
      url: https://x.com/aethardev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Download generated data
        uses: actions/download-artifact@v4
        with:
          name: weekly-data
          path: data/generated/

      - name: Post tweet to @aethardev
        run: npx tsx scripts/post-weekly-tweet.ts
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
